<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BetTrack Pro</title>
    <meta name="description" content="競馬収支管理・確定申告支援ツール">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Libraries (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- BASE STYLES --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
            background-color: #f8fafc; /* Slate-50 */
            color: #1e293b; /* Slate-800 */
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Mobile Optimization */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Interactive Elements */
        .tile-btn { transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); touch-action: manipulation; }
        .tile-btn:active { transform: scale(0.97); opacity: 0.9; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        /* Animations */
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PRINT OPTIMIZATION (A4 Full Spec) --- */
        @media print {
            @page { size: A4 landscape; margin: 10mm; } /* 横向き指定で幅いっぱい活用 */
            
            /* 1. FORCE RESET ROOT & BODY */
            html, body {
                width: 100% !important;
                height: auto !important;
                min-height: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                overflow: visible !important;
                display: block !important;
                color: black !important;
            }

            #root {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
            }

            /* 2. HIDE APP INTERFACE COMPLETELY */
            .app-view, .no-print, nav, .chart-wrapper, .input-area, .tile-btn, .chart-container, .toast {
                display: none !important;
            }

            /* 3. SHOW PRINT REPORT */
            .print-view {
                display: block !important;
                visibility: visible !important;
                width: 100% !important;
                position: static !important;
                font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
                color: black !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            /* 4. REPORT TYPOGRAPHY */
            .print-view h1 { 
                font-size: 18pt; font-weight: bold; text-align: center; 
                border-bottom: 2px solid black; margin-bottom: 5mm; padding-bottom: 2mm; 
            }
            .print-view h2 { 
                font-size: 12pt; font-weight: bold; margin-top: 5mm; margin-bottom: 2mm; 
                border-left: 4px solid #333; padding-left: 2mm; background-color: #f0f0f0;
            }
            
            /* 5. TABLE STYLING */
            .print-view table { 
                width: 100%; border-collapse: collapse; margin-bottom: 3mm; font-size: 9pt; table-layout: fixed;
            }
            .print-view th { 
                background-color: #e0e0e0 !important; color: black !important; font-weight: bold; 
                border: 1px solid black; padding: 4px; text-align: center; -webkit-print-color-adjust: exact; 
            }
            .print-view td { 
                border: 1px solid black; padding: 3px; vertical-align: middle; word-wrap: break-word;
            }
            .print-view .num { 
                font-family: 'Courier New', monospace; text-align: right; 
            }
            .print-view .center { text-align: center; }
            
            /* 6. UTILITIES */
            .page-break { page-break-before: always; }
            .disclaimer { 
                font-size: 7pt; color: #444; border: 1px solid #ccc; padding: 5px; margin-top: 10px; 
            }
        }

        /* Default: Hide Print View on Screen */
        .print-view { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONSTANTS & DATA ---

        const COURSE_DATA = {
            CENTRAL: {
                label: '中央競馬 (JRA)',
                tracks: ['東京', '中山', '京都', '阪神', '新潟', '福島', '中京', '小倉', '札幌', '函館']
            },
            LOCAL: {
                label: '地方競馬 (NAR)',
                tracks: ['大井', '船橋', '川崎', '浦和', '園田', '姫路', '高知', '名古屋', '笠松', '佐賀', '門別', '盛岡', '水沢', '金沢']
            },
            OVERSEAS: {
                label: '海外・その他',
                tracks: ['ロンシャン', 'シャティン', 'メイダン', 'アスコット', 'サンタアニタ', 'デルマー', '他海外']
            }
        };

        const SURFACES = [
            { id: 'TURF', label: '芝', color: 'bg-green-50 text-green-700 border-green-200' },
            { id: 'DIRT', label: 'ダート', color: 'bg-yellow-50 text-yellow-800 border-yellow-200' },
            { id: 'OBSTACLE', label: '障害', color: 'bg-blue-50 text-blue-800 border-blue-200' }
        ];

        const DISTANCES = [
            { id: 'SPRINT', label: '短距離', sub: '〜1300m' },
            { id: 'MILE', label: 'マイル', sub: '1400〜1800m' },
            { id: 'INTERMEDIATE', label: '中距離', sub: '1900〜2300m' },
            { id: 'LONG', label: '長距離', sub: '2400m〜' }
        ];

        const CONDITIONS = ['良', '稍重', '重', '不良'];

        const GRADES = [
            { id: 'G1', label: 'G1', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' },
            { id: 'G2', label: 'G2', color: 'bg-pink-100 text-pink-800 border-pink-300' },
            { id: 'G3', label: 'G3', color: 'bg-green-100 text-green-800 border-green-300' },
            { id: 'OP_L', label: 'OP/L', color: 'bg-purple-50 text-purple-700' },
            { id: '3C', label: '3勝C', color: 'bg-white text-gray-600' },
            { id: '2C', label: '2勝C', color: 'bg-white text-gray-600' },
            { id: '1C', label: '1勝C', color: 'bg-white text-gray-600' },
            { id: 'MAIDEN', label: '未勝利', color: 'bg-gray-50 text-gray-500' },
            { id: 'NEW', label: '新馬', color: 'bg-emerald-50 text-emerald-700' }
        ];
        
        const TICKET_TYPES = [
            { id: 'TAN', label: '単勝' },
            { id: 'FUKU', label: '複勝' },
            { id: 'WAKU', label: '枠連' },
            { id: 'UMA', label: '馬連' },
            { id: 'UTAN', label: '馬単' },
            { id: 'WIDE', label: 'ワイド' },
            { id: 'SANFUKU', label: '3連複' },
            { id: 'SANTAN', label: '3連単' },
            { id: 'WIN5', label: 'WIN5' }
        ];

        const TAX_BRACKETS = [
            { min: 0, max: 1949000, rate: 0.05, deduction: 0 },
            { min: 1950000, max: 3299000, rate: 0.10, deduction: 97500 },
            { min: 3300000, max: 6949000, rate: 0.20, deduction: 427500 },
            { min: 6950000, max: 8999000, rate: 0.23, deduction: 636000 },
            { min: 9000000, max: 17999000, rate: 0.33, deduction: 1536000 },
            { min: 18000000, max: 39999000, rate: 0.40, deduction: 2796000 },
            { min: 40000000, max: Infinity, rate: 0.45, deduction: 4796000 }
        ];

        // --- COMPONENTS ---

        const Icon = ({ name, className = "" }) => <i className={`fas fa-${name} ${className}`}></i>;

        const Tile = ({ label, sub, active, onClick, className = "", colorClass = "" }) => (
            <button onClick={onClick} className={`tile-btn relative p-1.5 rounded-xl border-2 font-bold text-sm flex flex-col items-center justify-center min-h-[52px] w-full leading-snug shadow-sm ${active ? `border-emerald-700 bg-emerald-700 text-white ring-2 ring-emerald-200 ring-offset-1` : `border-slate-100 bg-white text-slate-600 hover:bg-slate-50 hover:border-emerald-100 ${className}`}`}>
                <span className="z-10">{label}</span>
                {sub && <span className={`text-[9px] font-normal mt-0.5 ${active ? 'text-emerald-100' : 'text-slate-400'}`}>{sub}</span>}
                {active && <div className="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-emerald-300 rounded-full shadow-[0_0_4px_rgba(255,255,255,0.8)]" />}
            </button>
        );

        const SectionTitle = ({ children }) => (
            <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 mt-6 ml-1 flex items-center">
                <span className="w-1.5 h-1.5 bg-emerald-500 mr-2 rounded-full"></span>{children}
            </h3>
        );

        const NumPad = ({ value, onChange, onNext, label, confirmLabel = "決定" }) => {
            const displayValue = parseInt(value || '0').toLocaleString();
            const handleNum = (n) => {
                const current = value.toString();
                if (current === '0') onChange(n);
                else if (current.length < 9) onChange(current + n);
            };
            const handleBack = () => {
                const current = value.toString();
                if (current.length <= 1) onChange('0');
                else onChange(current.slice(0, -1));
            };
            const addAmount = (amount) => {
                const current = parseInt(value || '0');
                onChange((current + amount).toString());
            };

            return (
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <div className="flex justify-between items-end mb-6 px-1">
                        <span className="text-slate-500 font-bold text-xs tracking-wider">{label}</span>
                        <div className="text-3xl font-black text-slate-800 border-b-4 border-emerald-500/20 pb-1 min-w-[140px] text-right tracking-tight">
                            {displayValue === 'NaN' ? '0' : displayValue}<span className="text-sm font-medium text-slate-400 ml-2">円</span>
                        </div>
                    </div>
                    <div className="flex gap-2.5 mb-4">
                        <button onClick={() => addAmount(100)} className="flex-1 py-2.5 bg-slate-50 text-emerald-700 border border-slate-100 text-xs font-bold rounded-xl active:bg-emerald-50">+100</button>
                        <button onClick={() => addAmount(1000)} className="flex-1 py-2.5 bg-slate-50 text-emerald-700 border border-slate-100 text-xs font-bold rounded-xl active:bg-emerald-50">+1,000</button>
                        <button onClick={() => addAmount(10000)} className="flex-1 py-2.5 bg-slate-50 text-emerald-700 border border-slate-100 text-xs font-bold rounded-xl active:bg-emerald-50">+1万</button>
                    </div>
                    <div className="grid grid-cols-3 gap-2.5">
                        {[7,8,9,4,5,6,1,2,3].map(n => (
                            <button key={n} onClick={() => handleNum(n.toString())} className="h-14 bg-white border border-slate-100 rounded-2xl font-bold text-xl text-slate-700 shadow-[0_2px_0_#f1f5f9] active:shadow-none active:translate-y-[2px] transition-all">{n}</button>
                        ))}
                        <button onClick={() => onChange('0')} className="h-14 bg-rose-50 text-rose-500 rounded-2xl font-bold text-xs shadow-sm">クリア</button>
                        <button onClick={() => handleNum('0')} className="h-14 bg-white border border-slate-100 rounded-2xl font-bold text-xl text-slate-700 shadow-[0_2px_0_#f1f5f9] active:shadow-none active:translate-y-[2px]">0</button>
                        <button onClick={handleBack} className="h-14 bg-slate-100 text-slate-500 rounded-2xl shadow-sm flex items-center justify-center"><Icon name="backspace" /></button>
                    </div>
                    {onNext && (
                        <button onClick={onNext} className="w-full mt-6 h-14 bg-emerald-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-emerald-700/20 active:bg-emerald-800 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            {confirmLabel} <Icon name="check-circle" />
                        </button>
                    )}
                </div>
            );
        };

        // --- GLOBAL MEMORY ---
        let globalInputMemory = {
            date: new Date().toISOString().split('T')[0],
            courseCategory: 'CENTRAL',
            location: '',
            raceNumber: 11,
            surface: 'TURF',
            distance: 'MILE',
            condition: '良',
            grade: 'COND',
            ticketType: '3連単',
            horseNumber: null,
            investment: '',
            payout: ''
        };

        // --- VIEWS ---

        const InputView = ({ onSave, recordCount }) => {
            const [step, setStep] = React.useState(0);
            const [data, setData] = React.useState(globalInputMemory);

            const update = (key, val) => {
                const newData = { ...data, [key]: val };
                setData(newData);
                if (key !== 'investment' && key !== 'payout') {
                    globalInputMemory = { ...globalInputMemory, [key]: val };
                }
            };

            const StepIndicator = () => (
                <div className="flex gap-1.5 mb-6 justify-center">
                    {[0, 1, 2, 3].map(s => (
                        <div key={s} className={`h-1.5 rounded-full transition-all duration-300 ${step >= s ? 'w-8 bg-emerald-600' : 'w-4 bg-slate-200'}`} />
                    ))}
                </div>
            );

            return (
                <div className="pb-32 bg-slate-50 min-h-screen input-area">
                    <div className="bg-white sticky top-0 z-20 px-4 py-3 shadow-sm border-b border-slate-100 flex items-center justify-between">
                        <h2 className="font-bold text-slate-800 text-lg">
                            <span className="text-emerald-600 mr-2">STEP {step + 1}</span>
                            <span className="text-sm font-medium text-slate-400">
                            {step === 0 && '開催情報'} {step === 1 && 'レース詳細'} {step === 2 && '馬番'} {step === 3 && '収支'}
                            </span>
                        </h2>
                        {step > 0 && <button onClick={() => setStep(step - 1)} className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full">戻る</button>}
                    </div>

                    {recordCount >= 50 && recordCount % 50 === 0 && (
                        <div className="bg-amber-50 px-4 py-3 border-b border-amber-100 flex items-center justify-between animate-fade-in">
                            <div className="text-xs text-amber-700 font-bold flex items-center">
                                <Icon name="exclamation-triangle" className="mr-2" />記録が{recordCount}件を超えました
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-lg mx-auto animate-slide-up">
                        <StepIndicator />

                        {step === 0 && (
                            <>
                                <SectionTitle>日付</SectionTitle>
                                <input type="date" value={data.date} onChange={e => update('date', e.target.value)} className="w-full p-4 bg-white rounded-xl border-2 border-slate-100 font-bold text-lg mb-6 shadow-sm focus:border-emerald-500 focus:outline-none text-slate-700" />
                                <SectionTitle>主催カテゴリ</SectionTitle>
                                <div className="flex p-1.5 bg-slate-200 rounded-xl mb-4">
                                    {Object.keys(COURSE_DATA).map(cat => (
                                        <button key={cat} onClick={() => update('courseCategory', cat)} className={`flex-1 py-3 rounded-lg font-bold text-xs transition-all ${data.courseCategory === cat ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'}`}>{COURSE_DATA[cat].label.split('(')[0]}</button>
                                    ))}
                                </div>
                                <SectionTitle>競馬場</SectionTitle>
                                <div className="grid grid-cols-4 gap-2 mb-8">
                                    {COURSE_DATA[data.courseCategory].tracks.map(track => <Tile key={track} label={track} active={data.location === track} onClick={() => update('location', track)} />)}
                                </div>
                                <button onClick={() => setStep(1)} disabled={!data.location} className="w-full py-4 bg-emerald-700 text-white rounded-xl font-bold shadow-lg shadow-emerald-700/20 disabled:opacity-50 disabled:bg-slate-300 disabled:shadow-none transition-all flex items-center justify-center gap-2">次へ進む <Icon name="arrow-right" /></button>
                            </>
                        )}

                        {step === 1 && (
                            <>
                                <SectionTitle>レース番号</SectionTitle>
                                <div className="grid grid-cols-6 gap-2 mb-4">
                                    {[...Array(12)].map((_, i) => <Tile key={i} label={`${i+1}R`} active={data.raceNumber === i+1} onClick={() => update('raceNumber', i+1)} />)}
                                </div>
                                <SectionTitle>クラス / グレード</SectionTitle>
                                <div className="grid grid-cols-3 gap-2 mb-4">
                                    {GRADES.map(g => <Tile key={g.id} label={g.label} active={data.grade === g.id} onClick={() => update('grade', g.id)} colorClass={g.color} />)}
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <div><SectionTitle>馬場</SectionTitle><div className="grid grid-cols-1 gap-1.5">{SURFACES.map(s => <Tile key={s.id} label={s.label} active={data.surface === s.id} onClick={() => update('surface', s.id)} colorClass={s.color} />)}</div></div>
                                    <div><SectionTitle>距離</SectionTitle><div className="grid grid-cols-1 gap-1.5">{DISTANCES.map(d => <Tile key={d.id} label={d.label} sub={d.sub} active={data.distance === d.id} onClick={() => update('distance', d.id)} />)}</div></div>
                                </div>
                                <SectionTitle>馬場状態</SectionTitle>
                                <div className="grid grid-cols-4 gap-2 mb-6">
                                    {CONDITIONS.map(c => <Tile key={c} label={c} active={data.condition === c} onClick={() => update('condition', c)} />)}
                                </div>
                                <SectionTitle>券種</SectionTitle>
                                <div className="grid grid-cols-3 gap-2 mb-8">
                                    {TICKET_TYPES.map(t => <Tile key={t.id} label={t.label} active={data.ticketType === t.label} onClick={() => update('ticketType', t.label)} />)}
                                </div>
                                <button onClick={() => setStep(2)} className="w-full py-4 bg-emerald-700 text-white rounded-xl font-bold shadow-lg shadow-emerald-700/20 flex items-center justify-center gap-2">次へ進む <Icon name="arrow-right" /></button>
                            </>
                        )}

                        {step === 2 && (
                            <>
                                <SectionTitle>軸馬 / 注目馬 (任意)</SectionTitle>
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-8">
                                    <div className="grid grid-cols-6 gap-2">
                                        {[...Array(18)].map((_, i) => (
                                            <button key={i} onClick={() => update('horseNumber', data.horseNumber === i+1 ? null : i+1)} className={`aspect-square rounded-xl font-bold text-lg border-2 transition-all ${data.horseNumber === i+1 ? 'bg-indigo-600 border-indigo-600 text-white shadow-md transform scale-105' : 'bg-white border-slate-100 text-slate-700 hover:bg-slate-50'}`}>{i+1}</button>
                                        ))}
                                    </div>
                                    <div className="mt-6 text-center">
                                        <button onClick={() => update('horseNumber', null)} className="text-xs text-rose-400 font-bold px-4 py-2 border border-rose-100 rounded-full hover:bg-rose-50">選択をクリア</button>
                                    </div>
                                </div>
                                <button onClick={() => setStep(3)} className="w-full py-4 bg-emerald-700 text-white rounded-xl font-bold shadow-lg shadow-emerald-700/20 flex items-center justify-center gap-2">収支入力へ <Icon name="coins" /></button>
                            </>
                        )}

                        {step === 3 && (
                            <div className="space-y-6">
                                <NumPad label="購入金額 (投資)" value={data.investment} onChange={v => update('investment', v)} />
                                <NumPad label="払戻金額 (回収)" value={data.payout} onChange={v => update('payout', v)} confirmLabel="記録を保存" onNext={() => {
                                    onSave(data);
                                    // LOGIC: Increment Race +1, Reset Money to EMPTY STRING, Keep others
                                    const nextRaceNum = data.raceNumber < 12 ? data.raceNumber + 1 : 1;
                                    const nextState = {
                                        ...data,
                                        raceNumber: nextRaceNum,
                                        investment: '', // STRICTLY EMPTY
                                        payout: '',     // STRICTLY EMPTY
                                        horseNumber: null // Reset horse
                                    };
                                    globalInputMemory = nextState;
                                    setData(nextState);
                                    setStep(0); 
                                }} />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AnalysisView = ({ records }) => {
            const currentYear = new Date().getFullYear();
            const yearRecords = React.useMemo(() => records.filter(r => new Date(r.date).getFullYear() === currentYear), [records]);
            
            // Tax Logic
            const totalRevenue = yearRecords.reduce((sum, r) => sum + (parseInt(r.payout) || 0), 0);
            const winningRecords = yearRecords.filter(r => (parseInt(r.payout) || 0) > 0);
            const deductibleCost = winningRecords.reduce((sum, r) => sum + (parseInt(r.investment) || 0), 0);
            const temporaryIncome = Math.max(0, totalRevenue - deductibleCost - 500000);
            const taxableIncome = Math.floor(temporaryIncome * 0.5);

            let incomeTax = 0;
            if (taxableIncome > 0) {
                const bracket = TAX_BRACKETS.find(b => taxableIncome >= b.min && taxableIncome <= b.max);
                if (bracket) {
                    incomeTax = (taxableIncome * bracket.rate) - bracket.deduction;
                }
            }
            incomeTax = Math.max(0, Math.floor(incomeTax));
            const reconstructionTax = Math.floor(incomeTax * 0.021);
            const estimatedTaxTotal = incomeTax + reconstructionTax;

            // Chart Refs
            const chartLocRef = React.useRef(null);
            const chartGradeRef = React.useRef(null);
            const chartPieRef = React.useRef(null);

            React.useEffect(() => {
                if (!chartLocRef.current || !chartGradeRef.current || !chartPieRef.current) return;
                
                const aggregate = (keyFn) => {
                    const map = {};
                    yearRecords.forEach(r => {
                        const k = keyFn(r);
                        if (!map[k]) map[k] = 0;
                        map[k] += ((parseInt(r.payout)||0) - (parseInt(r.investment)||0));
                    });
                    return Object.entries(map).sort((a,b) => b[1] - a[1]);
                };

                const locData = aggregate(r => r.location);
                const gradeData = aggregate(r => { const g = GRADES.find(g => g.id === r.grade); return g ? g.label : (r.grade || '未設定'); });

                // PIE CHART DATA: Winning Counts by Track
                const winsByTrack = {};
                winningRecords.forEach(r => {
                    winsByTrack[r.location] = (winsByTrack[r.location] || 0) + 1;
                });
                const sortedWins = Object.entries(winsByTrack).sort((a,b) => b[1] - a[1]).slice(0, 8); // Top 8
                
                const createConfig = (labels, data, label) => ({
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label, data,
                            backgroundColor: data.map(v => v >= 0 ? 'rgba(5, 150, 105, 0.8)' : 'rgba(225, 29, 72, 0.8)'),
                            borderColor: data.map(v => v >= 0 ? '#047857' : '#be123c'),
                            borderWidth: 1, borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }
                    }
                });

                const c1 = new Chart(chartLocRef.current, createConfig(locData.map(d=>d[0]), locData.map(d=>d[1]), '場所別収支'));
                const c2 = new Chart(chartGradeRef.current, createConfig(gradeData.map(d=>d[0]), gradeData.map(d=>d[1]), 'グレード別収支'));

                // Pie Chart Configuration
                const pieColors = [
                    '#10b981', '#34d399', '#6ee7b7', '#a7f3d0', '#d1fae5', '#059669', '#047857', '#064e3b'
                ];
                const c3 = new Chart(chartPieRef.current, {
                    type: 'pie',
                    data: {
                        labels: sortedWins.map(d => d[0]),
                        datasets: [{
                            data: sortedWins.map(d => d[1]),
                            backgroundColor: pieColors,
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }
                        }
                    }
                });

                return () => { c1.destroy(); c2.destroy(); c3.destroy(); };
            }, [yearRecords]);

            return (
                <div className="pb-32 p-4 bg-slate-50 min-h-screen">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center"><Icon name="chart-line" className="mr-3 text-emerald-600" />収支分析</h2>
                    
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6 overflow-hidden relative">
                        <div className="flex justify-between items-baseline mb-6">
                             <div>
                                <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-1">Total Report</p>
                                <h1 className="text-2xl font-black text-slate-800">{currentYear}年</h1>
                             </div>
                             <div className="text-right">
                                <span className="text-xs font-medium text-slate-400">収支合計</span>
                                <div className={`text-2xl font-black ${totalRevenue - deductibleCost >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                    {(totalRevenue - deductibleCost) > 0 ? '+' : ''}{(totalRevenue - deductibleCost).toLocaleString()}
                                </div>
                             </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">総払戻 (Revenue)</p>
                                <p className="text-xl font-black text-slate-700">{totalRevenue.toLocaleString()}</p>
                            </div>
                            <div className="p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">経費 (Cost)</p>
                                <p className="text-xl font-black text-rose-500">▲{deductibleCost.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="bg-emerald-900 rounded-2xl p-5 text-white shadow-lg shadow-emerald-900/20 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="file-invoice-dollar" className="text-6xl" /></div>
                            <div className="relative z-10">
                                <p className="text-emerald-200 text-[10px] font-bold uppercase tracking-widest mb-1">Estimated Tax</p>
                                <div className="flex justify-between items-end">
                                    <span className="font-medium text-emerald-100 text-sm">納税目安額</span>
                                    <span className="text-3xl font-black tracking-tight">{estimatedTaxTotal.toLocaleString()} <span className="text-sm font-normal opacity-70">円</span></span>
                                </div>
                                <div className="mt-3 pt-3 border-t border-emerald-800 flex justify-between text-[10px] text-emerald-300">
                                    <span>一時所得: {temporaryIncome.toLocaleString()}円</span>
                                    <span>(控除後)</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center"><span className="w-1 h-4 bg-emerald-500 rounded-full mr-2"></span>場所別収支 (金額)</h3>
                            <div className="chart-container"><canvas ref={chartLocRef}></canvas></div>
                        </div>
                        
                        {/* New Pie Chart Component */}
                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center"><span className="w-1 h-4 bg-emerald-500 rounded-full mr-2"></span>的中数・相性 (場所別)</h3>
                            <div className="chart-container"><canvas ref={chartPieRef}></canvas></div>
                        </div>

                        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                            <h3 className="font-bold text-slate-700 mb-4 text-sm flex items-center"><span className="w-1 h-4 bg-emerald-500 rounded-full mr-2"></span>グレード別収支</h3>
                            <div className="chart-container"><canvas ref={chartGradeRef}></canvas></div>
                        </div>
                    </div>

                    <div className="mt-8 mb-4">
                        <button onClick={() => window.print()} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg shadow-slate-800/20 flex items-center justify-center gap-2 hover:bg-slate-700 transition-colors">
                            <Icon name="print" /> 帳票印刷 (PDF保存)
                        </button>
                        <p className="text-[10px] text-center text-slate-400 mt-2 font-medium">※ブラウザの印刷機能を使用します（A4横対応）</p>
                    </div>
                </div>
            );
        };

        const ListView = ({ records, onDelete }) => {
            const sorted = React.useMemo(() => [...records].sort((a, b) => b.timestamp - a.timestamp), [records]);
            return (
                <div className="pb-32 p-4 bg-slate-50 min-h-screen">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center"><Icon name="list-alt" className="mr-3 text-emerald-600" />記録一覧</h2>
                    {sorted.length === 0 ? <div className="text-center py-20 text-slate-400 font-medium">記録がありません</div> : 
                        <div className="space-y-4">{sorted.map(r => {
                            const profit = (parseInt(r.payout)||0) - (parseInt(r.investment)||0);
                            const isWin = (parseInt(r.payout)||0) > 0; // Payout exists
                            const isPlus = profit > 0; // Actual profit
                            
                            return (
                                <div key={r.id} className={`rounded-2xl p-5 shadow-sm border relative overflow-hidden transition-all ${isPlus ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-100'}`}>
                                    <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${isPlus ? 'bg-emerald-500' : 'bg-slate-200'}`}></div>
                                    <div className="pl-3">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-[10px] font-bold text-slate-400">{r.date.replace(/-/g, '/')}</span>
                                                    {isPlus && <span className="bg-yellow-400 text-yellow-900 text-[9px] font-black px-1.5 py-0.5 rounded shadow-sm">的中</span>}
                                                </div>
                                                <div className="font-bold text-lg text-slate-800">{r.location} <span className="text-sm font-normal text-slate-500 bg-white/50 px-1.5 py-0.5 rounded-md ml-1 border border-slate-100">{r.raceNumber}R</span></div>
                                            </div>
                                            <div className="text-right">
                                                <div className={`font-black text-xl ${isPlus ? 'text-emerald-600' : 'text-slate-800'}`}>
                                                    {isPlus ? '+' : ''}{profit.toLocaleString()}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 mb-3 text-[10px] font-bold">
                                            <span className="px-2 py-1 bg-white text-slate-600 rounded-md border border-slate-200">{GRADES.find(g=>g.id===r.grade)?.label}</span>
                                            <span className="px-2 py-1 bg-white text-slate-600 rounded-md border border-slate-200">{r.ticketType}</span>
                                            {r.horseNumber && <span className="px-2 py-1 bg-indigo-50 text-indigo-600 rounded-md border border-indigo-100">#{r.horseNumber}</span>}
                                        </div>
                                        <button onClick={() => onDelete(r.id)} className="w-full py-2 text-rose-500 text-xs font-bold border border-rose-100 rounded-xl hover:bg-rose-50 transition-colors bg-white">削除</button>
                                    </div>
                                </div>
                            );
                        })}</div>
                    }
                </div>
            );
        };

        const SettingsView = ({ records, onImport }) => {
            const exportData = () => {
                const blob = new Blob([JSON.stringify(records, null, 2)], {type: "application/json"});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `bettrack_backup_${new Date().toISOString().slice(0,10)}.json`;
                link.click();
            };
            return (
                <div className="pb-32 p-4 bg-slate-50 min-h-screen">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center"><Icon name="cog" className="mr-3 text-emerald-600" />設定</h2>
                    <div className="space-y-4">
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                             <div className="flex items-center mb-4"><div className="p-3 bg-emerald-50 text-emerald-600 rounded-full mr-4"><Icon name="download" /></div><div><h3 className="font-bold text-slate-700">バックアップ作成</h3><p className="text-[10px] text-slate-400">全データをJSONファイルとして保存します</p></div></div>
                             <button onClick={exportData} className="w-full py-3.5 bg-emerald-600 text-white rounded-xl font-bold shadow-md shadow-emerald-600/20 hover:bg-emerald-700 transition-all">データをダウンロード</button>
                        </div>
                        
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                             <div className="flex items-center mb-4"><div className="p-3 bg-blue-50 text-blue-600 rounded-full mr-4"><Icon name="upload" /></div><div><h3 className="font-bold text-slate-700">データ復元</h3><p className="text-[10px] text-slate-400">バックアップファイルを読み込みます</p></div></div>
                             <label className="block w-full py-3.5 bg-slate-50 text-slate-600 rounded-xl font-bold text-center cursor-pointer border-2 border-dashed border-slate-200 hover:bg-slate-100 hover:border-slate-300 transition-all">
                                JSONファイルを選択<input type="file" onChange={onImport} accept=".json" className="hidden" />
                             </label>
                        </div>
                    </div>
                </div>
            );
        };

        // --- PRINT VIEW COMPONENT (A4 Optimized) ---
        const PrintView = ({ records }) => {
            const currentYear = new Date().getFullYear();
            const yearRecords = records.filter(r => new Date(r.date).getFullYear() === currentYear);
            
            const totalRevenue = yearRecords.reduce((sum, r) => sum + (parseInt(r.payout) || 0), 0);
            const winningRecords = yearRecords.filter(r => (parseInt(r.payout) || 0) > 0);
            const deductibleCost = winningRecords.reduce((sum, r) => sum + (parseInt(r.investment) || 0), 0);
            const temporaryIncome = Math.max(0, totalRevenue - deductibleCost - 500000);
            const taxableIncome = Math.floor(temporaryIncome * 0.5);
            
            let incomeTax = 0;
            if (taxableIncome > 0) {
                const bracket = TAX_BRACKETS.find(b => taxableIncome >= b.min && taxableIncome <= b.max);
                if (bracket) incomeTax = (taxableIncome * bracket.rate) - bracket.deduction;
            }
            incomeTax = Math.max(0, Math.floor(incomeTax));
            const reconstructionTax = Math.floor(incomeTax * 0.021);
            const estimatedTaxTotal = incomeTax + reconstructionTax;

            const sortedRecords = [...winningRecords].sort((a, b) => new Date(a.date) - new Date(b.date));

            return (
                <div className="print-view">
                    <h1>{currentYear}年 競馬収支・一時所得計算書</h1>
                    <div className="disclaimer">
                        <strong>【重要】</strong> 本書類はアプリ内の記録に基づく計算結果です。確定申告の際は、必ず源泉徴収票や支払調書と照合し、所轄税務署の指導に従ってください。
                    </div>
                    
                    <h2>1. 収支計算概要</h2>
                    <table>
                        <thead><tr><th style={{width:'30%'}}>項目</th><th style={{width:'40%'}}>計算式・内容</th><th style={{width:'30%'}}>金額</th></tr></thead>
                        <tbody>
                            <tr><td>総払戻金額 (A)</td><td>的中投票券の払戻金合計</td><td className="num">{totalRevenue.toLocaleString()} 円</td></tr>
                            <tr><td>必要経費 (B)</td><td>的中投票券の購入費用</td><td className="num">▲ {deductibleCost.toLocaleString()} 円</td></tr>
                            <tr><td>特別控除額 (C)</td><td>一時所得の特別控除 (最大50万円)</td><td className="num">▲ 500,000 円</td></tr>
                            <tr style={{backgroundColor: '#eee'}}><td>一時所得 (D)</td><td>A - B - C (赤字は0)</td><td className="num font-bold">{temporaryIncome.toLocaleString()} 円</td></tr>
                        </tbody>
                    </table>

                    <h2>2. 納税額シミュレーション (目安)</h2>
                    <table>
                        <thead><tr><th style={{width:'30%'}}>項目</th><th style={{width:'40%'}}>計算式</th><th style={{width:'30%'}}>金額</th></tr></thead>
                        <tbody>
                            <tr><td>課税対象額 (E)</td><td>一時所得 (D) × 1/2</td><td className="num">{taxableIncome.toLocaleString()} 円</td></tr>
                            <tr><td>算出所得税 (F)</td><td>(E) × 税率 - 控除額</td><td className="num">{incomeTax.toLocaleString()} 円</td></tr>
                            <tr><td>復興特別所得税 (G)</td><td>(F) × 2.1%</td><td className="num">{reconstructionTax.toLocaleString()} 円</td></tr>
                            <tr style={{backgroundColor: '#eee'}}><td>最終納税目安</td><td>(F) + (G)</td><td className="num font-bold">{estimatedTaxTotal.toLocaleString()} 円</td></tr>
                        </tbody>
                    </table>

                    <div className="page-break"></div>

                    <h2>3. 的中履歴明細書 (抜粋)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th style={{width: '12%'}}>日付</th>
                                <th style={{width: '12%'}}>場所</th>
                                <th style={{width: '6%'}}>R</th>
                                <th style={{width: '10%'}}>券種</th>
                                <th style={{width: '20%'}}>投資 (経費)</th>
                                <th style={{width: '20%'}}>払戻 (収入)</th>
                                <th style={{width: '20%'}}>差引収支</th>
                            </tr>
                        </thead>
                        <tbody>
                            {sortedRecords.map((r, i) => (
                                <tr key={i}>
                                    <td className="center">{r.date}</td>
                                    <td className="center">{r.location}</td>
                                    <td className="center">{r.raceNumber}</td>
                                    <td className="center">{r.ticketType}</td>
                                    <td className="num">{parseInt(r.investment).toLocaleString()}</td>
                                    <td className="num font-bold">{parseInt(r.payout).toLocaleString()}</td>
                                    <td className="num">+{ (parseInt(r.payout) - parseInt(r.investment)).toLocaleString() }</td>
                                </tr>
                            ))}
                            <tr style={{backgroundColor: '#eee', fontWeight: 'bold', borderTop: '2px solid black'}}>
                                <td colSpan="4" className="center">合計</td>
                                <td className="num">{deductibleCost.toLocaleString()}</td>
                                <td className="num">{totalRevenue.toLocaleString()}</td>
                                <td className="num">+{ (totalRevenue - deductibleCost).toLocaleString() }</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [view, setView] = React.useState('INPUT');
            const [records, setRecords] = React.useState([]);

            React.useEffect(() => {
                const saved = localStorage.getItem('bettrack_records_v1');
                if (saved) { try { setRecords(JSON.parse(saved)); } catch (e) {} }
            }, []);

            const saveRecord = (data) => {
                const inv = parseInt(data.investment) || 0;
                const pay = parseInt(data.payout) || 0;
                const newRecord = { id: Date.now().toString(), ...data, investment: inv, payout: pay, timestamp: Date.now() };
                const updated = [newRecord, ...records];
                setRecords(updated);
                localStorage.setItem('bettrack_records_v1', JSON.stringify(updated));
                alert('記録を保存しました');
            };

            const deleteRecord = (id) => {
                if(!confirm('削除しますか？')) return;
                const updated = records.filter(r => r.id !== id);
                setRecords(updated);
                localStorage.setItem('bettrack_records_v1', JSON.stringify(updated));
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            setRecords(imported);
                            localStorage.setItem('bettrack_records_v1', JSON.stringify(imported));
                            alert('復元完了');
                        }
                    } catch (err) { alert('エラー: ファイル形式が不正です'); }
                };
                reader.readAsText(file);
            };

            return (
                <React.Fragment>
                    {/* Mobile App View */}
                    <div className="app-view min-h-screen max-w-md mx-auto bg-slate-50 shadow-2xl overflow-hidden relative border-x border-slate-200">
                        <main className="h-full overflow-y-auto hide-scrollbar">
                            {view === 'INPUT' && <InputView onSave={saveRecord} recordCount={records.length} />}
                            {view === 'LIST' && <ListView records={records} onDelete={deleteRecord} />}
                            {view === 'ANALYSIS' && <AnalysisView records={records} />}
                            {view === 'SETTINGS' && <SettingsView records={records} onImport={importData} />}
                        </main>
                        <nav className="absolute bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 flex justify-around items-center pb-safe pt-2 h-[80px] z-50">
                            {[ { id: 'INPUT', icon: 'plus-circle', label: '記録' }, { id: 'LIST', icon: 'list', label: '履歴' }, { id: 'ANALYSIS', icon: 'chart-pie', label: '分析' }, { id: 'SETTINGS', icon: 'cog', label: '設定' } ].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all duration-200 ${view === item.id ? 'text-emerald-600 scale-105' : 'text-slate-300'}`}>
                                    <Icon name={item.icon} className={`text-xl mb-0.5 ${view === item.id ? 'animate-pulse' : ''}`} /><span className="text-[10px] font-bold tracking-wide">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Print View */}
                    <PrintView records={records} />
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
